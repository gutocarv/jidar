<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c0a;color:#e8e6df;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:grid;grid-template-columns:1fr 220px;grid-template-rows:44px 1fr 120px;grid-template-areas:"hd hd" "map side" "log log";gap:0}
header{grid-area:hd;display:flex;align-items:center;gap:12px;padding:0 1rem;border-bottom:0.5px solid rgba(255,255,255,0.08);flex-wrap:wrap}
h1{font-size:14px;font-weight:500;color:#9fe1cb}
#status{font-size:13px;color:#888780}
#status.on{color:#5dcaa5}
#time-filter{font-size:12px;padding:3px 8px;background:#1a1a17;border:0.5px solid rgba(255,255,255,0.15);color:#e8e6df;border-radius:5px;cursor:pointer}
#stats{display:flex;gap:14px;margin-left:auto;font-size:13px;color:#888780}
#stats span{color:#e8e6df;font-weight:500}
#doa-bar{font-size:13px;color:#888780;display:flex;gap:6px;align-items:center}

#map-area{grid-area:map;position:relative;overflow:hidden}
canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);cursor:crosshair}

#tooltip .tt-name{font-weight:500;color:#e8e6df;margin-bottom:2px}

#side{grid-area:side;border-left:0.5px solid rgba(255,255,255,0.08);overflow-y:auto;display:flex;flex-direction:column}
#panel-det{padding:10px;border-bottom:0.5px solid rgba(255,255,255,0.08);display:none}
#panel-det img{width:100%;border-radius:6px;margin-bottom:8px;object-fit:cover;max-height:110px}
#panel-name{font-size:13px;font-weight:500;margin-bottom:2px}
#panel-sci{font-size:12px;color:#888780;font-style:italic;margin-bottom:4px}
#panel-info{font-size:12px;color:#888780;line-height:1.5}

const COLORS=['#1D9E75','#378ADD','#D85A30','#7F77DD','#BA7517','#D4537E','#97C459','#EF9F27','#48B8D0','#C46E9B'];
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W=500,H=500,CX=250,CY=250,RADAR_R=190;
let HOUSE_W=140,HOUSE_H=187;

let cfg={house:{width_m:12,height_m:9},has_doa:true,station_name:'jidar'};
const allDetections=[];
const speciesMap={};
const activeSpecies=new Set();
let selectedSci=null;
let filterHours=24;
let liveDoa=null,liveDoaTs=0;
let micX=CX,micY=CY; // atualizado em drawBase

// jitter deterministico por deteccao (baseado no index)
function jitter(index, radius=8){
  const angle = (index * 137.508) % 360; // angulo aureo - distribui bem
  const r = (index % 5) * (radius/5);
  return {
    dx: r * Math.cos(angle * Math.PI/180),
    dy: r * Math.sin(angle * Math.PI/180)
  };
}

function resize(){
  const area=document.getElementById('map-area');
  const sz=Math.min(area.clientWidth,area.clientHeight,520);
  canvas.width=sz;canvas.height=sz;
  W=H=sz;CX=CY=sz/2;RADAR_R=sz*0.38;
  HOUSE_H=Math.round(RADAR_R*0.65);
  HOUSE_W=Math.round(HOUSE_H*(cfg.house.height_m/cfg.house.width_m));
}

function deg2rad(d){return d*Math.PI/180}
function getColor(sci){
  if(!(sci in speciesMap)){speciesMap[sci]=Object.keys(speciesMap).length;activeSpecies.add(sci);}
  return COLORS[speciesMap[sci]%COLORS.length];
}

function filteredDetections(){
  const cutoff=Date.now() - filterHours*3600*1000;
  return allDetections.filter(d=>{
    const ts=new Date(d.datetime).getTime();
    return ts >= cutoff;
  });
}

function drawBase(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(CX,10);ctx.lineTo(CX,H-10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,CY);ctx.lineTo(W-10,CY);ctx.stroke();
  ctx.setLineDash([]);

  const dirs=[{l:'N',a:0},{l:'NE',a:45},{l:'L',a:90},{l:'SE',a:135},{l:'S',a:180},{l:'SO',a:225},{l:'O',a:270},{l:'NO',a:315}];
  ctx.strokeStyle='rgba(255,255,255,0.09)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.arc(CX,CY,RADAR_R,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,RADAR_R*.6,0,Math.PI*2);ctx.stroke();
  dirs.forEach(d=>{
    const r=deg2rad(d.a-90);
    ctx.strokeStyle=d.l==='N'?'#1D9E75':'rgba(255,255,255,0.12)';
    ctx.lineWidth=d.l==='N'?1.5:.5;
    ctx.beginPath();ctx.moveTo(CX+(RADAR_R-5)*Math.cos(r),CY+(RADAR_R-5)*Math.sin(r));
    ctx.lineTo(CX+(RADAR_R+3)*Math.cos(r),CY+(RADAR_R+3)*Math.sin(r));ctx.stroke();
    ctx.fillStyle=d.l==='N'?'#5dcaa5':'rgba(255,255,255,0.38)';
    ctx.font=d.l==='N'?'500 11px sans-serif':'10px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.l,CX+(RADAR_R+15)*Math.cos(r),CY+(RADAR_R+15)*Math.sin(r));
  });

  // escala: pixels por metro
  const ppm = HOUSE_H / cfg.house.width_m; // HOUSE_H = 12m NS
  const verandaW = Math.round(3 * ppm);     // 3m LO
  const verandaH = HOUSE_H;                 // 12m NS = altura total

  const hx = CX - HOUSE_W/2;
  const hy = CY - HOUSE_H/2;

  // varanda — face Leste (direita da casa)
  const vx = hx + HOUSE_W; // começa na borda direita da casa
  const vy = hy;
  ctx.fillStyle='rgba(29,158,117,0.05)';
  ctx.strokeStyle='rgba(93,202,165,0.3)';
  ctx.lineWidth=1;
  ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.roundRect(vx,vy,verandaW,verandaH,2);ctx.fill();ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(93,202,165,0.2)';ctx.font='9px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.save();ctx.translate(vx+verandaW/2,vy+verandaH/2);ctx.rotate(Math.PI/2);
  ctx.fillText('varanda',0,0);ctx.restore();

  // casa
  ctx.fillStyle='rgba(29,158,117,0.08)';ctx.strokeStyle='rgba(93,202,165,0.55)';ctx.lineWidth=1.5;
  ctx.setLineDash([]);
  ctx.beginPath();ctx.roundRect(hx,hy,HOUSE_W,HOUSE_H,3);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(93,202,165,0.38)';ctx.font='500 10px sans-serif';ctx.textAlign='center';
  ctx.fillText('casa',CX,CY);
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='10px sans-serif';
  ctx.fillText(cfg.house.width_m+'m',CX,hy-7);
  ctx.save();ctx.translate(hx-12,CY);ctx.rotate(-Math.PI/2);ctx.fillText(cfg.house.height_m+'m',0,0);ctx.restore();

  // posicao do ReSpeaker: 3m do Norte da varanda, 1m da face Leste da varanda
  // Norte da varanda = vy (topo), 3m para Sul = 3*ppm pixels abaixo do topo
  // face Leste da varanda = vx+verandaW, 1m para Oeste = verandaW - 1*ppm
  micX = vx + verandaW - Math.round(1 * ppm);
  micY = vy + Math.round(3 * ppm);
  if(BIRD_IMG.complete){
    const sz=18;
    ctx.drawImage(BIRD_IMG, micX-sz/2, micY-sz/2, sz, sz);
  } else {
    ctx.beginPath();ctx.arc(micX,micY,5,0,Math.PI*2);
    ctx.fillStyle='#D85A30';ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px sans-serif';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('mic',micX+8,micY-4);

  // comedouro de frutas: 3m ao Norte da face Norte da varanda, centrado na varanda
  // face Norte da varanda = vy, 3m acima = vy - 3*ppm
  // centrado na varanda = vx + verandaW/2
  // tamanho: 100cm LO x 50cm NS = 1m x 0.5m
  const cfX = vx + verandaW/2;
  const cfY = vy - Math.round(3 * ppm);
  const cfW = Math.round(1.0 * ppm);
  const cfH = Math.round(0.5 * ppm);
  ctx.fillStyle='rgba(255,180,50,0.15)';
  ctx.strokeStyle='rgba(255,180,50,0.7)';
  ctx.lineWidth=1.2;
  ctx.beginPath();ctx.roundRect(cfX-cfW/2, cfY-cfH/2, cfW, cfH, 2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,180,50,0.8)';ctx.font='9px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('comedouro', cfX, cfY-cfH/2-2);

  // bebedouro beija-flores: 6m ao Sul da face Sul da casa, 2m Leste da face Leste da varanda
  // face Sul da casa = hy + HOUSE_H, 6m abaixo
  // face Leste da varanda = vx + verandaW, 2m para Leste
  const bbX = vx + verandaW + Math.round(2 * ppm);
  const bbY = hy + HOUSE_H + Math.round(6 * ppm);
  const bbR1 = Math.round(0.5 * ppm); // circulo externo 50cm raio
  const bbR2 = Math.round(0.15 * ppm); // circulo interno
  ctx.strokeStyle='rgba(100,180,255,0.7)';ctx.fillStyle='rgba(100,180,255,0.1)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(bbX,bbY,bbR1,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(100,180,255,0.3)';
  ctx.beginPath();ctx.arc(bbX,bbY,bbR2,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(100,180,255,0.8)';ctx.font='9px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('bebedouro', bbX, bbY+bbR1+2);

  // legenda discreta
  const leg = [
    {color:'rgba(93,202,165,0.7)', label:'casa', fill:'rgba(29,158,117,0.08)', type:'rect'},
    {color:'rgba(93,202,165,0.3)', label:'varanda', fill:'rgba(29,158,117,0.05)', type:'rect-dash'},
    {color:'rgba(255,180,50,0.7)', label:'comedouro', fill:'rgba(255,180,50,0.15)', type:'rect'},
    {color:'rgba(100,180,255,0.7)', label:'bebedouro', fill:'rgba(100,180,255,0.1)', type:'circle'},
  ];
  const lx=8, ly=H-8-leg.length*16-8;
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.roundRect(lx,ly,100,leg.length*16+10,4);ctx.fill();ctx.stroke();
  leg.forEach((item,i)=>{
    const iy=ly+6+i*16;
    if(item.type==='circle'){
      ctx.beginPath();ctx.arc(lx+10,iy+5,5,0,Math.PI*2);
      ctx.fillStyle=item.fill;ctx.fill();
      ctx.strokeStyle=item.color;ctx.lineWidth=1;ctx.stroke();
    } else {
      ctx.fillStyle=item.fill;ctx.strokeStyle=item.color;ctx.lineWidth=1;
      if(item.type==='rect-dash') ctx.setLineDash([2,2]); else ctx.setLineDash([]);
      ctx.beginPath();ctx.roundRect(lx+5,iy,10,10,1);ctx.fill();ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='10px sans-serif';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(item.label,lx+20,iy+5);
  });

  if(!cfg.has_doa){
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('sem DOA nesta estacao',CX,CY+HOUSE_H/2+20);
  }
}

function drawLiveDoa(){
  if(!liveDoa||!cfg.has_doa) return;
  const age=(Date.now()-liveDoaTs)/1000;
  if(age>10) return;
  const alpha=Math.max(0,1-age/10)*0.45;
  const r=deg2rad(liveDoa-90);
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#5dcaa5';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(micX,micY);ctx.lineTo(micX+RADAR_R*Math.cos(r),micY+RADAR_R*Math.sin(r));ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

let hitAreas=[];
function drawDetections(){
  hitAreas=[];
  const visible=filteredDetections().filter(d=>d.azimute!=null&&activeSpecies.has(d.sci_name));

  visible.forEach((d,i)=>{
    const r=deg2rad(d.azimute-90);
    const dist=RADAR_R-16;
    const j=jitter(i, 12);
    const x=micX+dist*Math.cos(r)+j.dx;
    const y=micY+dist*Math.sin(r)+j.dy;
    const color=getColor(d.sci_name);
    const selected=selectedSci===d.sci_name;
    const isNew=d.historic===false;
    const size=isNew?7:5;

    ctx.strokeStyle=color+(selected?'66':'22');ctx.lineWidth=.5;ctx.setLineDash([2,4]);
    ctx.beginPath();ctx.moveTo(micX,micY);ctx.lineTo(x,y);ctx.stroke();ctx.setLineDash([]);

    if(selected||isNew){
      ctx.beginPath();ctx.arc(x,y,size+5,0,Math.PI*2);
      ctx.strokeStyle=color+'44';ctx.lineWidth=1;ctx.stroke();
    }
    ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fillStyle=color+(selected?'ff':isNew?'dd':'77');ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=selected?1.5:.8;ctx.stroke();

    hitAreas.push({x,y,r:size+4,d});
  });

  // labels agrupados por especie (um label por especie, na media dos pontos)
  const speciesCenters={};
  visible.forEach((d,i)=>{
    if(!activeSpecies.has(d.sci_name)||d.azimute==null) return;
    const r=deg2rad(d.azimute-90);
    const j=jitter(i,12);
    const x=micX+(RADAR_R-16)*Math.cos(r)+j.dx;
    const y=micY+(RADAR_R-16)*Math.sin(r)+j.dy;
    if(!speciesCenters[d.sci_name]){speciesCenters[d.sci_name]={xs:[],ys:[],pt:d.name_pt,color:getColor(d.sci_name)};}
    speciesCenters[d.sci_name].xs.push(x);
    speciesCenters[d.sci_name].ys.push(y);
  });
  Object.values(speciesCenters).forEach(s=>{
    const mx=s.xs.reduce((a,b)=>a+b,0)/s.xs.length;
    const my=s.ys.reduce((a,b)=>a+b,0)/s.ys.length;
    const nx=micX+(mx-micX)*1.18, ny=micY+(my-micY)*1.18;
    ctx.fillStyle=s.color;ctx.font='500 10px sans-serif';
    ctx.textAlign=nx>CX+20?'left':nx<CX-20?'right':'center';ctx.textBaseline='middle';
    ctx.fillText(s.pt||s.sci_name,nx,ny);
  });
}

function render(){
  drawBase();drawLiveDoa();drawDetections();
  requestAnimationFrame(render);
}

// tooltip on hover
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*scaleX, my=(e.clientY-rect.top)*scaleY;
  const tip=document.getElementById('tooltip');
  for(const h of hitAreas){
    if(Math.hypot(mx-h.x,my-h.y)<=h.r){
      const d=h.d;
      const color=getColor(d.sci_name);
      document.getElementById('tt-name').innerHTML=`<span class="tt-dot" style="background:${color}"></span>${d.name_pt||d.com_name}`;
      document.getElementById('tt-sci').textContent=d.sci_name;
      document.getElementById('tt-time').textContent='⏱ '+(d.datetime||'').replace('T',' ').slice(0,19);
      document.getElementById('tt-az').textContent=d.azimute!=null?`⟳ ${d.azimute.toFixed(1)}° ${d.quadrante}`:'sem azimute';
      document.getElementById('tt-conf').textContent=`★ confiança ${(d.confidence*100).toFixed(0)}%`;
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-10)+'px';
      return;
    }
  }
  tip.style.display='none';
});
canvas.addEventListener('mouseleave',()=>document.getElementById('tooltip').style.display='none');

// clique para painel lateral
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*scaleX, my=(e.clientY-rect.top)*scaleY;
  for(const h of hitAreas){
    if(Math.hypot(mx-h.x,my-h.y)<=h.r){
      openPanel(h.d); return;
    }
  }
  closePanel();
});

async function openPanel(d){
  selectedSci=d.sci_name;
  const panel=document.getElementById('panel-det');
  panel.style.display='block';
  document.getElementById('panel-name').textContent=d.name_pt||d.com_name;
  document.getElementById('panel-sci').textContent=d.sci_name;
  const dets=allDetections.filter(x=>x.sci_name===d.sci_name);
  const ok=dets.filter(x=>x.qualidade==='ok'&&x.azimute!=null);
  // media circular correta
  let azMed='—';
  if(ok.length){
    const s=ok.reduce((a,x)=>a+Math.sin(x.azimute*Math.PI/180),0);
    const c=ok.reduce((a,x)=>a+Math.cos(x.azimute*Math.PI/180),0);
    azMed=(Math.atan2(s,c)*180/Math.PI+360).toFixed(1)+'°';
  }
  // quadrante do azimute medio
  const azQuad=ok.length?(()=>{const a=parseFloat(azMed)%360;return a<22.5||a>=337.5?'N':a<67.5?'NE':a<112.5?'L':a<157.5?'SE':a<202.5?'S':a<247.5?'SO':a<292.5?'O':'NO';})():'';
  document.getElementById('panel-info').innerHTML=
    `${dets.length} deteccoes &nbsp;|&nbsp; ${ok.length} com azimute<br>`+
    (ok.length?`azimute: ${azMed} ${azQuad}`:'sem dados de azimute');
  document.getElementById('panel-img').style.display='block';
  document.getElementById('panel-img').src='';
  try{
    const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(d.sci_name.replace(' ','_'))}`);
    const data=await r.json();
    if(data.thumbnail) document.getElementById('panel-img').src=data.thumbnail.source;
    else document.getElementById('panel-img').style.display='none';
  }catch(e){document.getElementById('panel-img').style.display='none';}
}

function closePanel(){
  selectedSci=null;
  document.getElementById('panel-det').style.display='none';
}
document.getElementById('panel-close').addEventListener('click',closePanel);

// filtro de tempo
document.getElementById('time-filter').addEventListener('change',e=>{
  filterHours=parseInt(e.target.value);
  updateStats();updateLegend();rebuildLog();
});

function updateLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  const visible=filteredDetections();
  const sciInView=new Set(visible.map(d=>d.sci_name));
  Object.keys(speciesMap).forEach(sci=>{
    const dets=visible.filter(d=>d.sci_name===sci);
    if(!dets.length) return;
    const ok=dets.filter(d=>d.qualidade==='ok').length;
    const pt=dets[0]?.name_pt||sci;
    const color=getColor(sci);
    const div=document.createElement('div');
    div.className='leg-item'+(activeSpecies.has(sci)?'':' off');
    div.innerHTML=`<div class="leg-dot" style="background:${color}"></div><div>
      <div class="leg-pt">${pt}</div>
      <div class="leg-sci">${sci}</div>
      <div class="leg-n">${ok} ok / ${dets.length} total</div></div>`;
    div.addEventListener('click',()=>{
      if(activeSpecies.has(sci)) activeSpecies.delete(sci); else activeSpecies.add(sci);
      div.classList.toggle('off');
    });
    leg.appendChild(div);
  });
}

function rebuildLog(){
  const log=document.getElementById('log-area');
  log.innerHTML='';
  const visible=[...filteredDetections()].reverse();
  visible.forEach(d=>addLogRow(d,false));
}

function addLogRow(d, prepend=true){
  const log=document.getElementById('log-area');
  const color=getColor(d.sci_name);
  const t=(d.datetime||'').replace('T',' ').slice(11,19);
  const row=document.createElement('div');row.className='log-row';
  row.addEventListener('click',()=>openPanel(d));
  if(d.qualidade==='ok'){
    row.innerHTML=`<div class="log-dot" style="background:${color}"></div>
      <span class="log-time">${t}</span>
      <span class="log-name">${d.name_pt||d.com_name}</span>
      <span class="log-az">${d.azimute!=null?d.azimute.toFixed(1)+'°':''}</span>
      <span class="log-q">${d.quadrante||''}</span>
      ${d.historic===false?'<span class="log-new">novo</span>':''}`;
  } else {
    row.innerHTML=`<div class="log-dot" style="background:#5f5e5a"></div>
      <span class="log-time">${t}</span>
      <span class="log-name log-sem">${d.name_pt||d.com_name}</span>
      <span class="log-q log-sem">${d.qualidade}</span>`;
  }
  if(prepend) log.insertBefore(row,log.firstChild);
  else log.appendChild(row);
  while(log.children.length>120) log.removeChild(log.lastChild);
}

function updateStats(){
  const v=filteredDetections();
  document.getElementById('s-tot').textContent=v.length;
  document.getElementById('s-ok').textContent=v.filter(d=>d.qualidade==='ok').length;
  document.getElementById('s-spp').textContent=new Set(v.map(d=>d.sci_name)).size;
}



const DATA_URL='data.json';
const REFRESH_MS=5*60*1000;

async function loadData(){
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    const data=await r.json();
    if(data.station) document.getElementById('station-name').textContent=data.station;
    if(data.house){cfg.house=data.house;resize();}
    allDetections=data.detections||[];
    allDetections.forEach(d=>getColor(d.sci_name));
    updateStats();updateLegend();rebuildLog();
    const exp=new Date(data.exported_at).toLocaleString('pt-BR');
    document.getElementById('updated').textContent='atualizado '+exp;
  }catch(e){
    document.getElementById('updated').textContent='erro ao carregar dados';
  }
  setTimeout(loadData,REFRESH_MS);
}

window.addEventListener('resize',()=>{resize();});
resize();render();loadData();
</script>
